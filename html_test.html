<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Notification Circles</title>
    <style>
        .circle {
            width: 50px;
            height: 50px;
            background-color: grey;
            border-radius: 50%;
            display: inline-block;
            margin: 5px;
            transition: background-color 0.5s;
        }
        .illuminated {
            background-color: green; /* Illuminated color */
        }
    </style>
</head>
<body>
    <div id="circleContainer">
        <!-- Generate circles dynamically or manually place them here -->
    </div>

    <script>
        // Function to simulate receiving a message
        function receiveMessage() {
            // Simulate illuminating a random circle
            const circles = document.getElementsByClassName('circle');
            const randomCircle = circles[Math.floor(Math.random() * circles.length)];
            randomCircle.classList.add('illuminated');

            // Optionally, set a timer to revert the circle back to its non-illuminated state
            setTimeout(() => {
                randomCircle.classList.remove('illuminated');
            }, 3000); // 3 seconds
        }

        // Generating circles dynamically
        const circleContainer = document.getElementById('circleContainer');
        for (let i = 0; i < 10; i++) { // Example: Create 10 circles
            const circle = document.createElement('div');
            circle.classList.add('circle');
            circleContainer.appendChild(circle);
        }

        // Simulate receiving a message every 5 seconds (replace with actual webhook event)
        setInterval(receiveMessage, 5000);
    </script>
</body>
</html>
